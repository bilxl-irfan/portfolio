  <!-- Three connection stubs -->
  <line x1="24" y1="5" x2="24" y2="9" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="8" y1="24" x2="12" y2="24" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="36" x2="33" y2="33" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
